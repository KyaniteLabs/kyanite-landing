name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Check
        run: |
          python -m py_compile app.py
          python - <<'PY'
          import json
          from app import app

          client = app.test_client()
          paths = [
              "/",
              "/static/posthog.js",
              "/static/liminal-sites/liminal-sensorium.css",
              "/static/liminal-sites/liminal-sensorium.js",
              "/static/liminal-sites/liminal-sensorium-config.json",
              "/static/liminal-sites/liminal-sensorium-manifest.json",
          ]

          for path in paths:
              response = client.get(path)
              assert response.status_code == 200, (path, response.status_code)

          html = client.get("/").get_data(as_text=True)
          assert "/static/posthog.js" in html
          assert "/static/liminal-sites/liminal-sensorium.js" in html
          assert "/implementation/intake" in html

          posthog_js = client.get("/static/posthog.js").get_data(as_text=True)
          assert "navigator.sendBeacon" in posthog_js
          assert "keepalive:true" in posthog_js

          config = json.loads(client.get("/static/liminal-sites/liminal-sensorium-config.json").get_data(as_text=True))
          assert config["guardrails"]["missionLocked"] is True
          assert "copy" in config["guardrails"]["protectedSurfaces"]
          assert "layout" in config["guardrails"]["protectedSurfaces"]
          assert config["layerConfig"]["runtimeFlags"]["pointerEvents"] == "none"
          PY
